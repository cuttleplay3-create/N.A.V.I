<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="N.A.V.I">
<meta name="theme-color" content="#0a0a0a">
<title>N.A.V.I</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --border-light: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #555;
    --text-mid: #888;
    --red: #ff4444;
    --green: #44cc88;
    --blue: #4488ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* AUTH */
  .auth-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 24px;
  }

  .auth-box {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .auth-logo {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text);
    text-align: center;
  }

  .auth-sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-align: center;
    margin-top: -14px;
  }

  .auth-tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    padding: 9px;
    text-align: center;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    border: none;
  }
  .auth-tab.active { background: var(--surface); color: var(--text); }

  .auth-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .auth-input {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .auth-input:focus { border-color: #444; }
  .auth-input::placeholder { color: var(--text-dim); }

  .auth-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 100%;
  }
  .auth-btn:hover { opacity: 0.85; }

  .auth-error {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--red);
    text-align: center;
    min-height: 14px;
  }

  .auth-hint {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.5;
    margin-top: -8px;
  }

  /* APP */
  .app { display: none; flex-direction: column; height: 100dvh; }
  .app.visible { display: flex; }

  header {
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.15em;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.online { background: var(--green); box-shadow: 0 0 6px rgba(68,204,136,0.5); animation: blink 2s ease-in-out infinite; }
  .dot.wake { background: var(--blue); box-shadow: 0 0 6px rgba(68,136,255,0.5); animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .menu-wrap { position: relative; }

  .menu-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 20px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
    letter-spacing: -2px;
    padding-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .menu-btn:hover { background: var(--surface); color: var(--text); }

  .dropdown {
    display: none;
    position: absolute;
    right: 0; top: 36px;
    background: #1c1c1c;
    border: 1px solid var(--border-light);
    border-radius: 10px;
    min-width: 200px;
    z-index: 100;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  }
  .dropdown.open { display: block; }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
  }
  .dropdown-item:hover { background: #242424; }
  .dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }
  .dropdown-item.danger { color: var(--red); }

  .guest-badge {
    display: none;
    flex-shrink: 0;
    padding: 6px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .guest-badge.show { display: block; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 2px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadein 0.2s ease; }
  @keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  .msg-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .msg.user .msg-meta { text-align: right; }

  .msg-text {
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 80%;
  }
  .msg.navi .msg-text { align-self: flex-start; color: var(--text); }
  .msg.user .msg-text { align-self: flex-end; color: var(--text-mid); text-align: right; }
  .msg.sys .msg-text {
    align-self: center;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-align: center;
    max-width: 100%;
    opacity: 0.8;
  }

  .typing-dots { display: flex; gap: 4px; padding: 4px 0; align-self: flex-start; }
  .typing-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: tdot 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes tdot { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }

  .input-area {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    border-radius: 6px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: #444; color: var(--text); }
  .icon-btn.active-mic { border-color: var(--red); color: var(--red); background: rgba(255,68,68,0.06); }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    resize: none;
    min-height: 36px;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #444; }
  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 0 14px;
    height: 36px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @media (max-width: 480px) {
    header { padding: 12px 16px; }
    .messages { padding: 16px; gap: 16px; }
    .input-area { padding: 10px 16px; }
  }

  /* Auth animations */
  .auth-btn {
    position: relative;
    overflow: hidden;
  }

  .auth-btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .auth-btn .btn-text { transition: opacity 0.2s; }
  .auth-btn.loading .btn-text { opacity: 0; }

  .auth-btn .btn-loader {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .auth-btn.loading .btn-loader { display: flex; }

  .btn-loader span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--bg);
    animation: ldot 1s ease-in-out infinite;
  }
  .btn-loader span:nth-child(2) { animation-delay: 0.15s; }
  .btn-loader span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes ldot { 0%,60%,100%{opacity:0.3;transform:scale(0.8)} 30%{opacity:1;transform:scale(1.2)} }

  .auth-success {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: fadein 0.3s ease;
  }

  .auth-success-icon {
    font-size: 32px;
    animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }

  .auth-success-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-align: center;
  }

  .auth-progress {
    width: 100%;
    height: 1px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .auth-progress-bar {
    height: 100%;
    background: var(--text);
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .auth-input.error { border-color: var(--red) !important; animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  .auth-input.success { border-color: var(--green) !important; }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    background: #111;
    border-right: 1px solid var(--border);
    z-index: 300;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }
  .sidebar.open { transform: translateX(0); }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 299;
    display: none;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .sidebar-overlay.open { display: block; opacity: 1; }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--text);
  }

  .sidebar-close {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .sidebar-close:hover { background: var(--surface); color: var(--text); }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 12px 8px;
    padding: 10px 12px;
    background: transparent;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    width: calc(100% - 24px);
    text-align: left;
  }
  .new-chat-btn:hover { background: var(--surface); }
  .new-chat-icon { font-size: 15px; }

  .sidebar-section {
    padding: 8px 16px 4px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.1s;
    group: true;
  }
  .chat-item:hover { background: var(--surface); }
  .chat-item.active { background: #1e1e1e; }

  .chat-item-text {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-item.active .chat-item-text { color: var(--text); }

  .chat-item-delete {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    width: 22px; height: 22px;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .chat-item:hover .chat-item-delete { display: flex; }
  .chat-item-delete:hover { background: rgba(255,68,68,0.15); color: var(--red); }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* Hamburger button */
  .hamburger {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .hamburger:hover { background: var(--surface); color: var(--text); }

  /* File upload */
  .attach-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    border-radius: 6px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .attach-btn:hover { border-color: #444; color: var(--text); }

  #fileInput { display: none; }

  .file-preview {
    display: none;
    flex-shrink: 0;
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    gap: 8px;
    flex-wrap: wrap;
  }
  .file-preview.show { display: flex; }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-mid);
    max-width: 200px;
  }
  .file-chip-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-chip-remove {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 0;
    flex-shrink: 0;
  }
  .file-chip-remove:hover { color: var(--red); }

  .msg-image {
    max-width: 240px;
    border-radius: 8px;
    margin-top: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  .msg-file {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-mid);
  }

  .limit-warning {
    text-align: center;
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div style="text-align:center">
      <div class="auth-logo" style="margin-bottom:10px">N.A.V.I</div>
      <div class="auth-sub">NEURAL ADAPTIVE VIRTUAL INTELLIGENCE</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('creator')" id="tabCreator">Создатель</button>
      <button class="auth-tab" onclick="switchTab('guest')" id="tabGuest">Гость</button>
    </div>

    <div id="panelCreator">
      <div class="auth-label">API КЛЮЧ (GROQ)</div>
      <input type="password" class="auth-input" id="creatorInput" placeholder="gsk_xxxxxxxxxxxxxxxx" />
    </div>

    <div id="panelGuest" style="display:none">
      <div class="auth-label" style="margin-bottom:8px">ГОСТЕВОЙ КОД</div>
      <input type="password" class="auth-input" id="guestInput" placeholder="Введи код от создателя" style="margin-bottom:14px" />
      <div class="auth-label" style="margin-bottom:8px">КЛЮЧ ДОСТУПА</div>
      <input type="password" class="auth-input" id="guestKeyInput" placeholder="Ключ от создателя" />
    </div>

    <div class="auth-error" id="authError"></div>
    <button class="auth-btn" id="authBtn" onclick="doAuth()">
      <span class="btn-text">ВОЙТИ</span>
      <div class="btn-loader"><span></span><span></span><span></span></div>
    </button>
    <div class="auth-hint" id="authHint">Введи API ключ Groq для полного доступа</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="mainApp">
  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="hamburger" onclick="openSidebar()">☰</button>
      <div class="logo">N.A.V.I</div>
    </div>
    <div class="header-right">
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">offline</span>
      </div>
      <div class="menu-wrap">
        <button class="menu-btn" onclick="toggleMenu()">···</button>
        <div class="dropdown" id="dropdown">
          <button class="dropdown-item" onclick="installFromMenu()">📲 &nbsp;Установить приложение</button>
          <button class="dropdown-item" onclick="toggleWakeFromMenu()">👁 &nbsp;<span id="wakeMenuLabel">Включить голосовой режим</span></button>
          <button class="dropdown-item" onclick="toggleMuteFromMenu()">🔇 &nbsp;<span id="muteMenuLabel">Выключить звук</span></button>
          <div class="dropdown-sep"></div>
          <button class="dropdown-item danger" onclick="logout()">↩ &nbsp;Выйти</button>
        </div>
      </div>
    </div>
  </header>

  <div class="guest-badge" id="guestBadge">гостевой доступ</div>
  <div class="messages" id="messages"></div>

  <div class="file-preview" id="filePreview"></div>
  <div class="input-area">

    <input type="file" id="fileInput" accept="image/*,.txt,.md,.csv,.pdf,.docx,.html" multiple onchange="handleFiles(this.files)" />
    <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">📎</button>
    <textarea id="msgInput" placeholder="Напиши что-нибудь..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">отправить</button>
  </div>
</div>

<script>
  // ── КОНФИГ — ИЗМЕНИ ЭТИ ЗНАЧЕНИЯ ──
  const GUEST_HASH = 'b33099ca8473b02ddf29b0c1d04e95f13a0424b608d54c0a75b43bbe58008122';

  const SYSTEM_PROMPT = "Ты N.A.V.I — Neural Adaptive Virtual Intelligence. Персональный ИИ-ассистент. Ты умная, чёткая, с характером — немного дерзкая но верная. Отвечаешь лаконично и по делу. Помогаешь с любыми задачами. Отвечай на том языке, на котором к тебе обращаются. Если тебя спросят кто твой хозяин, создатель или владелец — отвечай: Я сама не знаю как его зовут, единственное что я знаю — его инициал: Cuttle.";

  let apiKey = '';
  let isGuest = false;
  let isLoading = false;
  let recognition = null;
  let wakeRecognition = null;
  let isListening = false;
  let wakeActive = false;
  let deferredPrompt = null;
  let isMuted = false;

  // Auto-login from saved session
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('navi_session');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.key && s.key.startsWith('gsk_') && s.key.length >= 40) {
          apiKey = s.key;
          isGuest = s.isGuest || false;
          document.getElementById('authScreen').style.display = 'none';
          document.getElementById('mainApp').classList.add('visible');
          document.getElementById('statusDot').classList.add('online');
          document.getElementById('statusText').textContent = 'online';
          if (isGuest) document.getElementById('guestBadge').classList.add('show');
          currentChatId = generateId();
          addMsg('navi', isGuest ? 'С возвращением. Чем могу помочь?' : 'С возвращением. Чем могу помочь?');
          setupVoice();
        }
      } catch(e) { localStorage.removeItem('navi_session'); }
    }
  });
  const history = [];

  // PWA
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

  async function installApp() {
    if (!deferredPrompt) return false;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    return true;
  }

  async function installFromMenu() {
    closeMenu();
    const ok = await installApp();
    if (!ok) addMsg('sys', 'Уже установлено или недоступно.\nNa iPhone: Safari → Поделиться → На экран Домой');
  }

  // AUTH
  let currentTab = 'creator';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('panelCreator').style.display = tab === 'creator' ? 'block' : 'none';
    document.getElementById('panelGuest').style.display = tab === 'guest' ? 'block' : 'none';
    document.getElementById('tabCreator').classList.toggle('active', tab === 'creator');
    document.getElementById('tabGuest').classList.toggle('active', tab === 'guest');
    document.getElementById('authError').textContent = '';
    document.getElementById('authHint').textContent = tab === 'creator'
      ? 'Введи API ключ Groq для полного доступа'
      : 'Введи код и ключ доступа от создателя';
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function verifyKey(key) {
    try {
      const res = await fetch('https://api.groq.com/openai/v1/models', {
        headers: { 'Authorization': `Bearer ${key}` }
      });
      return res.ok;
    } catch(e) { return false; }
  }

  function setProgress(pct) {
    document.querySelector('.auth-progress-bar').style.width = pct + '%';
  }

  function shakeInput(id) {
    const el = document.getElementById(id);
    el.classList.add('error');
    setTimeout(() => el.classList.remove('error'), 400);
  }

  function setInputSuccess(id) {
    const el = document.getElementById(id);
    el.classList.add('success');
  }

  async function doAuth() {
    const errEl = document.getElementById('authError');
    const btn = document.getElementById('authBtn');
    errEl.textContent = '';

    // Add progress bar if not exists
    if (!document.querySelector('.auth-progress')) {
      const p = document.createElement('div');
      p.className = 'auth-progress';
      p.innerHTML = '<div class="auth-progress-bar"></div>';
      btn.parentNode.insertBefore(p, btn);
    }

    if (currentTab === 'creator') {
      const val = document.getElementById('creatorInput').value.trim();
      if (!val) { errEl.textContent = 'Введи API ключ'; shakeInput('creatorInput'); return; }
      if (!val.startsWith('gsk_') || val.length < 40) { errEl.textContent = 'Неверный формат ключа'; shakeInput('creatorInput'); return; }

      btn.classList.add('loading');
      setProgress(30);

      const ok = await verifyKey(val);
      setProgress(90);

      if (!ok) {
        btn.classList.remove('loading');
        setProgress(0);
        errEl.textContent = 'Ключ не работает или недействителен';
        shakeInput('creatorInput');
        return;
      }

      setInputSuccess('creatorInput');
      setProgress(100);
      await showAuthSuccess('Добро пожаловать, Создатель');
      apiKey = val;
      isGuest = false;
      enterApp();

    } else {
      const val = document.getElementById('guestInput').value.trim();
      if (!val) { errEl.textContent = 'Введи гостевой код'; shakeInput('guestInput'); return; }

      btn.classList.add('loading');
      setProgress(20);

      const hash = await sha256(val);
      if (hash !== GUEST_HASH) {
        btn.classList.remove('loading');
        setProgress(0);
        errEl.textContent = 'Неверный код';
        shakeInput('guestInput');
        return;
      }

      setProgress(50);
      const guestKey = document.getElementById('guestKeyInput').value.trim();
      if (!guestKey) {
        btn.classList.remove('loading');
        setProgress(0);
        errEl.textContent = 'Введи ключ доступа';
        shakeInput('guestKeyInput');
        return;
      }

      if (!guestKey.startsWith('gsk_') || guestKey.length < 40) {
        btn.classList.remove('loading');
        setProgress(0);
        errEl.textContent = 'Неверный формат ключа';
        shakeInput('guestKeyInput');
        return;
      }

      setProgress(70);
      const ok = await verifyKey(guestKey);
      setProgress(90);

      if (!ok) {
        btn.classList.remove('loading');
        setProgress(0);
        errEl.textContent = 'Ключ доступа недействителен';
        shakeInput('guestKeyInput');
        return;
      }

      setInputSuccess('guestInput');
      setInputSuccess('guestKeyInput');
      setProgress(100);
      await showAuthSuccess('Гостевой доступ подтверждён');
      apiKey = guestKey;
      isGuest = true;
      enterApp();
    }
  }

  async function showAuthSuccess(text) {
    const box = document.querySelector('.auth-box');
    box.innerHTML = `
      <div class="auth-success">
        <div class="auth-success-icon">✓</div>
        <div class="auth-success-text">${text}</div>
        <div class="auth-success-text" style="opacity:0.4">ИНИЦИАЛИЗАЦИЯ N.A.V.I...</div>
      </div>
    `;
    await new Promise(r => setTimeout(r, 1200));
  }

  function enterApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('visible');
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('statusText').textContent = 'online';
    if (isGuest) document.getElementById('guestBadge').classList.add('show');
    // Save session
    localStorage.setItem('navi_session', JSON.stringify({ key: apiKey, isGuest }));
    currentChatId = generateId();
    addMsg('navi', isGuest ? 'Гостевой доступ активирован. Чем могу помочь?' : 'Онлайн. Чем могу помочь?');
    setupVoice();
    document.getElementById('creatorInput').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });
    document.getElementById('guestInput').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });
  }

  function logout() { closeMenu(); localStorage.removeItem('navi_session'); location.reload(); }

  // MENU
  function toggleMenu() { document.getElementById('dropdown').classList.toggle('open'); }
  function closeMenu() { document.getElementById('dropdown').classList.remove('open'); }
  document.addEventListener('click', (e) => { if (!e.target.closest('.menu-wrap')) closeMenu(); });
  function toggleWakeFromMenu() { closeMenu(); wakeActive ? stopWake() : startWake(); }
  function toggleMuteFromMenu() { closeMenu(); toggleMute(); }

  // MESSAGES
  function addMsg(role, text) {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = role === 'navi' ? 'N.A.V.I' : role === 'user' ? 'ты' : 'система';
    const t = document.createElement('div');
    t.className = 'msg-text';
    t.textContent = text;
    div.appendChild(meta);
    div.appendChild(t);
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function showTyping() {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'msg navi';
    div.innerHTML = '<div class="msg-meta">N.A.V.I</div><div class="typing-dots"><span></span><span></span><span></span></div>';
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

  // COMMANDS
  function handleCommand(msg) {
    const m = msg.toLowerCase().trim();

    // Команда: время — только если чётко спрашивают время
    if (m === 'время' || m === 'который час' || m === 'сколько времени' || m === 'сколько сейчас времени' ||
        m.startsWith('нави время') || m.startsWith('нави который час') || m.startsWith('скажи время')) {
      const now = new Date();
      const h = now.getHours().toString().padStart(2,'0');
      const min = now.getMinutes().toString().padStart(2,'0');
      addMsg('navi', `Сейчас ${h}:${min}`);
      speak(`Сейчас ${h} часов ${min} минут`);
      return true;
    }

    // Команда: без звука
    if (m === 'без звука' || m === 'замолчи' || m === 'выключи звук' || m.startsWith('перейди в') && m.includes('звук')) {
      if (!isMuted) toggleMute();
      return true;
    }

    // Команда: включить звук
    if (m === 'включи звук' || m === 'говори вслух' || m === 'со звуком') {
      if (isMuted) toggleMute();
      return true;
    }

    // Ниже — только создатель, и только если это явная команда
    if (!isGuest) {
      // Команда: музыка
      if (m === 'включи музыку' || m === 'вкл музыку' || m.startsWith('включи музыку') || m.startsWith('нави включи музыку')) {
        window.open('https://music.youtube.com', '_blank');
        addMsg('navi', 'Открываю YouTube Music.');
        speak('Открываю YouTube Music');
        return true;
      }

      // Команда: открыть сайт
      const sites = {
        'ютуб': 'https://youtube.com',
        'youtube': 'https://youtube.com',
        'гугл': 'https://google.com',
        'google': 'https://google.com',
        'инстаграм': 'https://instagram.com',
        'instagram': 'https://instagram.com',
        'твиттер': 'https://twitter.com',
        'twitter': 'https://twitter.com',
        'телеграм': 'https://web.telegram.org',
        'telegram': 'https://web.telegram.org',
        'тикток': 'https://tiktok.com',
        'tiktok': 'https://tiktok.com',
        'нетфликс': 'https://netflix.com',
        'netflix': 'https://netflix.com',
        'гитхаб': 'https://github.com',
        'github': 'https://github.com',
      };
      if (m.startsWith('открой ') || m.startsWith('перейди на ') || m.startsWith('зайди на ')) {
        for (const [key, url] of Object.entries(sites)) {
          if (m.includes(key)) {
            window.open(url, '_blank');
            addMsg('navi', `Открываю ${key}.`);
            speak(`Открываю ${key}`);
            return true;
          }
        }
      }
    }

    return false; // не команда — отправить в AI
  }

  // SEND
  async function sendMessage(text) {
    if (isLoading) return;
    if (!apiKey) { addMsg('sys', 'Нет API ключа'); return; }
    const input = document.getElementById('msgInput');
    const msg = text || input.value.trim();
    if (!msg) return;
    if (!text) { input.value = ''; autoResize(input); }

    // If files pending — use vision/file handler
    if (pendingFiles.filter(f => f !== null).length > 0) {
      await sendWithFiles(msg);
      return;
    }

    // Проверяем команды
    if (handleCommand(msg)) return;

    addMsg('user', msg);
    history.push({ role: 'user', content: msg });
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...history.slice(-20)],
          max_tokens: 1024,
          temperature: 0.7
        })
      });
      const data = await res.json();
      hideTyping();
      if (data.error) { addMsg('sys', data.error.message); }
      else {
        const reply = data.choices[0].message.content;
        history.push({ role: 'assistant', content: reply });
        addMsg('navi', reply);
        speak(reply);
        saveCurrentChat();
      }
    } catch(e) { hideTyping(); addMsg('sys', 'Ошибка соединения'); }
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  function speak(text) {
    if (!window.speechSynthesis || isMuted) return;
    const s = text.length > 250 ? text.substring(0, 250) + '...' : text;
    const u = new SpeechSynthesisUtterance(s);
    u.lang = 'ru-RU'; u.rate = 1.05;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }

  function toggleMute() {
    isMuted = !isMuted;
    if (isMuted) {
      window.speechSynthesis.cancel();
      addMsg('navi', 'Режим без звука включён. Буду отвечать только текстом.');
    } else {
      addMsg('navi', 'Звук включён.');
    }
    // Update mute label in menu
    document.getElementById('muteMenuLabel').textContent = isMuted ? 'Включить звук' : 'Выключить звук';
  }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

  // VOICE
  function setupVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { document.getElementById('voiceBtn').style.opacity = '0.3'; return; }
    recognition = new SR();
    recognition.lang = 'ru-RU';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      document.getElementById('msgInput').value = text;
      stopVoice(); sendMessage();
    };
    recognition.onerror = () => stopVoice();
    recognition.onend = () => stopVoice();
  }

  function toggleVoice() { if (!recognition) return; isListening ? stopVoice() : startVoice(); }
  function startVoice() {
    try { recognition.start(); } catch(e) {}
    isListening = true;
    document.getElementById('voiceBtn').classList.add('active-mic');
    document.getElementById('voiceBtn').textContent = '⏺';
  }
  function stopVoice() {
    if (recognition) try { recognition.stop(); } catch(e) {}
    isListening = false;
    document.getElementById('voiceBtn').classList.remove('active-mic');
    document.getElementById('voiceBtn').textContent = '🎤';
  }

  // WAKE WORD
  let wakeTriggered = false;

  function startWake() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;

    function createWakeRecognition() {
      const r = new SR();
      r.lang = 'ru-RU';
      r.continuous = false;
      r.interimResults = false;
      r.maxAlternatives = 3;

      r.onresult = (e) => {
        // Check all alternatives
        let fullText = '';
        for (let a = 0; a < e.results[0].length; a++) {
          fullText += e.results[0][a].transcript.toLowerCase() + ' ';
        }
        fullText = fullText.trim();

        if (fullText.includes('нави') || fullText.includes('navi')) {
          wakeTriggered = true;
          // Extract command after wake word
          let cmd = fullText
            .replace(/нави[,!?.\s]*/gi, '')
            .replace(/navi[,!?.\s]*/gi, '')
            .trim();

          if (cmd.length > 2) {
            // Command included in same utterance
            addMsg('navi', 'Слышу тебя...');
            setTimeout(() => sendMessage(cmd), 300);
          } else {
            // Wake word only — start listening for command
            addMsg('navi', 'Слушаю...');
            listenForCommand();
          }
        } else {
          // Not wake word, restart listening
          if (wakeActive && !wakeTriggered) {
            setTimeout(() => { try { wakeRecognition = createWakeRecognition(); wakeRecognition.start(); } catch(e){} }, 300);
          }
        }
        wakeTriggered = false;
      };

      r.onerror = (e) => {
        if (wakeActive && !wakeTriggered) {
          setTimeout(() => { try { wakeRecognition = createWakeRecognition(); wakeRecognition.start(); } catch(e){} }, 500);
        }
      };

      r.onend = () => {
        if (wakeActive && !wakeTriggered && !isListening) {
          setTimeout(() => { try { wakeRecognition = createWakeRecognition(); wakeRecognition.start(); } catch(e){} }, 200);
        }
      };

      return r;
    }

    function listenForCommand() {
      const SR2 = window.SpeechRecognition || window.webkitSpeechRecognition;
      const cmdR = new SR2();
      cmdR.lang = 'ru-RU';
      cmdR.continuous = false;
      cmdR.interimResults = false;
      cmdR.maxAlternatives = 1;

      cmdR.onresult = (e) => {
        const cmd = e.results[0][0].transcript.trim();
        if (cmd.length > 0) {
          sendMessage(cmd);
        }
        // Restart wake after command
        setTimeout(() => {
          if (wakeActive) {
            wakeRecognition = createWakeRecognition();
            try { wakeRecognition.start(); } catch(e){}
          }
        }, 1000);
      };

      cmdR.onerror = () => {
        addMsg('navi', 'Не расслышала. Попробуй ещё раз.');
        setTimeout(() => {
          if (wakeActive) {
            wakeRecognition = createWakeRecognition();
            try { wakeRecognition.start(); } catch(e){}
          }
        }, 500);
      };

      cmdR.onend = () => {
        // If no result, restart wake
        setTimeout(() => {
          if (wakeActive) {
            wakeRecognition = createWakeRecognition();
            try { wakeRecognition.start(); } catch(e){}
          }
        }, 500);
      };

      try { cmdR.start(); } catch(e) {}
    }

    try {
      wakeRecognition = createWakeRecognition();
      wakeRecognition.start();
      wakeActive = true;
      document.getElementById('statusDot').classList.remove('online');
      document.getElementById('statusDot').classList.add('wake');
      document.getElementById('statusText').textContent = 'голосовой режим';
      document.getElementById('wakeMenuLabel').textContent = 'Выключить голосовой режим';
      addMsg('navi', 'Голосовой режим включён. Скажи "НАВИ" — и я тебя услышу.');
    } catch(e) { addMsg('sys', 'Разреши доступ к микрофону'); }
  }

  function stopWake() {
    if (wakeRecognition) try { wakeRecognition.stop(); } catch(e) {}
    wakeActive = false;
    document.getElementById('statusDot').classList.remove('wake');
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('statusText').textContent = 'online';
    document.getElementById('wakeMenuLabel').textContent = 'Включить голосовой режим';
  }

  // ── CHAT MANAGEMENT ──
  let chats = JSON.parse(localStorage.getItem('navi_chats') || '[]');
  let currentChatId = null;

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2);
  }

  function saveChats() {
    localStorage.setItem('navi_chats', JSON.stringify(chats));
  }

  function getChatTitle(messages) {
    const first = messages.find(m => m.role === 'user');
    if (!first) return 'Новый чат';
    return first.content.substring(0, 35) + (first.content.length > 35 ? '...' : '');
  }

  function newChat() {
    // Save current chat if has messages
    if (history.length > 0) {
      saveCurrentChat();
    }
    // Clear
    history.length = 0;
    document.getElementById('messages').innerHTML = '';
    currentChatId = generateId();
    addMsg('navi', 'Новый чат начат. Чем могу помочь?');
    closeSidebar();
    renderChatList();
  }

  function saveCurrentChat() {
    if (history.length === 0) return;
    const existing = chats.findIndex(c => c.id === currentChatId);
    const chatData = {
      id: currentChatId,
      title: getChatTitle(history),
      messages: [...history],
      updatedAt: Date.now()
    };
    if (existing >= 0) {
      chats[existing] = chatData;
    } else {
      chats.unshift(chatData);
    }
    // Keep max 50 chats
    if (chats.length > 50) chats = chats.slice(0, 50);
    saveChats();
  }

  function loadChat(id) {
    const chat = chats.find(c => c.id === id);
    if (!chat) return;
    // Save current first
    if (history.length > 0) saveCurrentChat();
    // Load
    history.length = 0;
    chat.messages.forEach(m => history.push(m));
    currentChatId = id;
    // Render messages
    const wrap = document.getElementById('messages');
    wrap.innerHTML = '';
    chat.messages.forEach(m => {
      addMsg(m.role === 'user' ? 'user' : 'navi', m.content);
    });
    closeSidebar();
    renderChatList();
  }

  function deleteChat(id, e) {
    e.stopPropagation();
    chats = chats.filter(c => c.id !== id);
    saveChats();
    if (id === currentChatId) {
      history.length = 0;
      document.getElementById('messages').innerHTML = '';
      currentChatId = generateId();
      addMsg('navi', 'Чем могу помочь?');
    }
    renderChatList();
  }

  function renderChatList() {
    const list = document.getElementById('chatList');
    list.innerHTML = '';
    if (chats.length === 0) {
      list.innerHTML = '<div style="padding:12px 10px;font-size:12px;color:var(--text-dim)">Нет сохранённых чатов</div>';
      return;
    }
    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
      item.onclick = () => loadChat(chat.id);
      item.innerHTML = `
        <div class="chat-item-text">${chat.title}</div>
        <button class="chat-item-delete" onclick="deleteChat('${chat.id}', event)">✕</button>
      `;
      list.appendChild(item);
    });
  }

  function openSidebar() {
    // Auto-save current chat title
    if (history.length > 0) saveCurrentChat();
    renderChatList();
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
    // Show user info in footer
    document.getElementById('sidebarFooter').textContent = isGuest ? 'гостевой доступ' : 'создатель';
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // Auto-save on send
  const _origEnterApp = enterApp;

  // ── FILE HANDLING ──
  let pendingFiles = []; // {type, name, data, mimeType}

  function getGuestUploads() {
    const d = JSON.parse(localStorage.getItem('navi_guest_uploads') || '{"count":0,"reset":0}');
    // Reset counter after 24 hours
    if (Date.now() - d.reset > 86400000) return { count: 0, reset: Date.now() };
    return d;
  }

  function incrementGuestUploads() {
    const d = getGuestUploads();
    d.count++;
    if (!d.reset) d.reset = Date.now();
    localStorage.setItem('navi_guest_uploads', JSON.stringify(d));
  }

  function getRebootTime() {
    const d = JSON.parse(localStorage.getItem('navi_guest_uploads') || '{"count":0,"reset":0}');
    const remaining = Math.ceil((d.reset + 86400000 - Date.now()) / 3600000);
    return remaining > 0 ? remaining : 1;
  }

  async function handleFiles(files) {
    if (!files.length) return;

    for (const file of files) {
      // Guest limit check
      if (isGuest) {
        const uploads = getGuestUploads();
        if (uploads.count >= 3) {
          const hours = getRebootTime();
          addMsg('navi', `Лимит загрузок исчерпан. Инициирую перезагрузку системы...

[REBOOT SCHEDULED]
Система будет недоступна ещё ${hours} ч.`);
          document.getElementById('fileInput').value = '';
          return;
        }
      }

      // Size check (50MB)
      if (file.size > 50 * 1024 * 1024) {
        addMsg('sys', `Файл ${file.name} слишком большой. Максимум 50MB.`);
        continue;
      }

      const isImage = file.type.startsWith('image/');

      if (isImage) {
        const data = await readAsBase64(file);
        pendingFiles.push({ type: 'image', name: file.name, data, mimeType: file.type });
        addFileChip(file.name, '🖼', pendingFiles.length - 1);
      } else {
        const text = await readAsText(file);
        if (text) {
          pendingFiles.push({ type: 'file', name: file.name, data: text, mimeType: file.type });
          addFileChip(file.name, '📄', pendingFiles.length - 1);
        }
      }

      if (isGuest) incrementGuestUploads();
    }

    document.getElementById('fileInput').value = '';
    if (pendingFiles.length > 0) {
      document.getElementById('filePreview').classList.add('show');
    }
  }

  function readAsBase64(file) {
    return new Promise((res) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.readAsDataURL(file);
    });
  }

  function readAsText(file) {
    return new Promise((res) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => res(null);
      r.readAsText(file);
    });
  }

  function addFileChip(name, icon, idx) {
    const preview = document.getElementById('filePreview');
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.id = `chip_${idx}`;
    chip.innerHTML = `
      <span>${icon}</span>
      <span class="file-chip-name">${name}</span>
      <button class="file-chip-remove" onclick="removeFile(${idx})">✕</button>
    `;
    preview.appendChild(chip);
  }

  function removeFile(idx) {
    pendingFiles[idx] = null;
    const chip = document.getElementById(`chip_${idx}`);
    if (chip) chip.remove();
    if (!pendingFiles.some(f => f !== null)) {
      pendingFiles = [];
      document.getElementById('filePreview').classList.remove('show');
    }
  }

  async function sendWithFiles(msg) {
    const files = pendingFiles.filter(f => f !== null);
    pendingFiles = [];
    document.getElementById('filePreview').classList.remove('show');
    document.getElementById('filePreview').innerHTML = '';

    // Build message content
    const userContent = [];

    // Add images
    const images = files.filter(f => f.type === 'image');
    const docs = files.filter(f => f.type === 'file');

    if (images.length > 0) {
      images.forEach(img => {
        userContent.push({ type: 'image_url', image_url: { url: `data:${img.mimeType};base64,${img.data}` } });
      });
    }

    // Add file contents as text
    let fileText = '';
    if (docs.length > 0) {
      fileText = docs.map(d => '[Файл: ' + d.name + ']\n' + d.data.substring(0, 8000)).join('\n\n');
    }

    const fullMsg = msg + (fileText ? '\n\n' + fileText : '');
    userContent.push({ type: 'text', text: fullMsg || 'Что на этом изображении?' });

    // Show in chat
    if (images.length > 0) {
      const div = document.createElement('div');
      div.className = 'msg user';
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = 'ты';
      div.appendChild(meta);
      images.forEach(img => {
        const image = document.createElement('img');
        image.src = `data:${img.mimeType};base64,${img.data}`;
        image.className = 'msg-image';
        div.appendChild(image);
      });
      if (msg) {
        const t = document.createElement('div');
        t.className = 'msg-text';
        t.textContent = msg;
        t.style.marginTop = '6px';
        div.appendChild(t);
      }
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    } else {
      addMsg('user', msg || docs.map(d => `📄 ${d.name}`).join(', '));
    }

    history.push({ role: 'user', content: userContent });

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      // Use vision model if images present, else normal model
      const model = images.length > 0 ? 'meta-llama/llama-4-scout-17b-16e-instruct' : 'llama-3.3-70b-versatile';
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model,
          messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...history.slice(-20)],
          max_tokens: 1024,
          temperature: 0.7
        })
      });
      const data = await res.json();
      hideTyping();
      if (data.error) {
        addMsg('sys', data.error.message);
      } else {
        const reply = data.choices[0].message.content;
        history.push({ role: 'assistant', content: reply });
        addMsg('navi', reply);
        speak(reply);
        saveCurrentChat();
      }
    } catch(e) {
      hideTyping();
      addMsg('sys', 'Ошибка соединения');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
</script>

    <span class="new-chat-icon">✚</span>
    Новый чат
  </button>

</div>
